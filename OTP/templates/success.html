<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login Successful — SecureOTP</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      font-family: 'DM Sans', sans-serif;
      background: #0f0318;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden; position: relative;
    }
    body::before {
      content: '';
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 15% 20%, rgba(236,72,153,0.30) 0%, transparent 55%),
        radial-gradient(ellipse 60% 70% at 85% 80%, rgba(168,85,247,0.28) 0%, transparent 55%),
        radial-gradient(ellipse 50% 40% at 55% 5%,  rgba(251,113,133,0.12) 0%, transparent 60%);
      animation: meshShift 14s ease-in-out infinite alternate;
    }
    @keyframes meshShift {
      0%   { filter: hue-rotate(0deg); }
      100% { filter: hue-rotate(20deg); }
    }
    .orb { position: fixed; border-radius: 50%; filter: blur(90px); opacity: 0.30; animation: floatOrb 20s ease-in-out infinite; pointer-events: none; z-index: 0; }
    .orb-1 { width: 500px; height: 500px; background: #ec4899; top: -160px; left: -120px; }
    .orb-2 { width: 350px; height: 350px; background: #a855f7; bottom: -100px; right: -80px; animation-delay: -7s; }
    .orb-3 { width: 220px; height: 220px; background: #f472b6; top: 40%; left: 65%; animation-delay: -4s; }
    @keyframes floatOrb {
      0%, 100% { transform: translateY(0) scale(1); }
      50%       { transform: translateY(-50px) scale(1.07); }
    }
    .grid {
      position: fixed; inset: 0; z-index: 0;
      background-image:
        linear-gradient(rgba(236,72,153,0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(236,72,153,0.05) 1px, transparent 1px);
      background-size: 55px 55px;
    }
    .card {
      position: relative; z-index: 2;
      background: rgba(255,255,255,0.06);
      backdrop-filter: blur(30px) saturate(180%);
      -webkit-backdrop-filter: blur(30px) saturate(180%);
      border: 1px solid rgba(255,255,255,0.13);
      border-radius: 28px;
      box-shadow: 0 8px 64px rgba(0,0,0,0.55), inset 0 1px 0 rgba(255,255,255,0.13);
      padding: 52px 44px 44px;
      width: 100%; max-width: 420px;
      animation: cardIn 0.7s cubic-bezier(0.22,1,0.36,1) both;
      text-align: center;
    }
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(40px) scale(0.97); }
      to   { opacity: 1; transform: none; }
    }
    .brand { display: flex; align-items: center; justify-content: center; gap: 11px; margin-bottom: 36px; }
    .brand-icon {
      width: 44px; height: 44px;
      background: linear-gradient(135deg, #ec4899, #a855f7);
      border-radius: 13px;
      display: flex; align-items: center; justify-content: center;
      font-size: 21px;
      box-shadow: 0 4px 22px rgba(236,72,153,0.45);
    }
    .brand-name { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.25rem; color: #fce7f3; letter-spacing: -0.01em; }
    /* Success icon ring animation */
    .success-ring {
      width: 90px; height: 90px;
      margin: 0 auto 28px;
      position: relative;
    }
    .success-ring svg {
      width: 100%; height: 100%;
      animation: ringIn 0.6s ease both 0.3s;
    }
    @keyframes ringIn {
      from { opacity: 0; transform: scale(0.5) rotate(-90deg); }
      to   { opacity: 1; transform: none; }
    }
    .checkmark {
      stroke-dasharray: 60;
      stroke-dashoffset: 60;
      animation: drawCheck 0.5s ease forwards 0.7s;
    }
    @keyframes drawCheck {
      to { stroke-dashoffset: 0; }
    }
    .circle-bg {
      stroke-dasharray: 283;
      stroke-dashoffset: 283;
      animation: drawCircle 0.6s ease forwards 0.3s;
    }
    @keyframes drawCircle {
      to { stroke-dashoffset: 0; }
    }
    .success-badge {
      display: inline-flex; align-items: center; gap: 6px;
      background: rgba(236,72,153,0.15);
      border: 1px solid rgba(236,72,153,0.30);
      border-radius: 20px;
      padding: 4px 14px;
      font-size: 0.75rem; font-weight: 500;
      color: #f9a8d4;
      margin-bottom: 16px;
    }
    h2 { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 1.85rem; color: #fce7f3; letter-spacing: -0.03em; margin-bottom: 8px; }
    .subtitle { color: rgba(249,168,212,0.60); font-size: 0.9rem; font-weight: 300; margin-bottom: 28px; }
    /* Info card */
    .info-card {
      background: rgba(236,72,153,0.10);
      border: 1px solid rgba(236,72,153,0.22);
      border-radius: 16px;
      padding: 20px 22px;
      margin-bottom: 28px;
      text-align: left;
    }
    .info-row { display: flex; align-items: center; gap: 12px; }
    .info-row + .info-row { margin-top: 14px; padding-top: 14px; border-top: 1px solid rgba(236,72,153,0.15); }
    .info-icon { font-size: 18px; flex-shrink: 0; }
    .info-label { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.07em; color: rgba(249,168,212,0.45); margin-bottom: 2px; }
    .info-value { font-size: 0.95rem; color: #fce7f3; font-weight: 500; }
    .btn-logout {
      width: 100%; padding: 15px;
      background: linear-gradient(135deg, #ec4899 0%, #a855f7 100%);
      border: none; border-radius: 13px;
      color: #fff;
      font-family: 'Syne', sans-serif;
      font-weight: 700; font-size: 1rem;
      cursor: pointer;
      box-shadow: 0 4px 24px rgba(236,72,153,0.40);
      transition: transform 0.15s, box-shadow 0.15s, filter 0.15s;
      text-decoration: none; display: block;
      position: relative; overflow: hidden;
    }
    .btn-logout::after {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(120deg, rgba(255,255,255,0.15) 0%, transparent 60%);
      pointer-events: none;
    }
    .btn-logout:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(236,72,153,0.50); filter: brightness(1.07); }
    .btn-logout:active { transform: translateY(0); }
    /* Confetti dots */
    .confetti { position: fixed; inset: 0; pointer-events: none; z-index: 1; overflow: hidden; }
    .dot {
      position: absolute;
      width: 8px; height: 8px;
      border-radius: 50%;
      animation: confettiFall linear infinite;
      opacity: 0;
    }
    @keyframes confettiFall {
      0%   { transform: translateY(-20px) rotate(0deg); opacity: 1; }
      100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
    }
  </style>
</head>
<body>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
  <div class="grid"></div>
  <div class="confetti" id="confetti"></div>

  <div class="card">
    <div class="brand">
      <div class="brand-icon">🔐</div>
      <span class="brand-name">SecureOTP</span>
    </div>

    <div class="success-ring">
      <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="50" cy="50" r="45" stroke="rgba(236,72,153,0.20)" stroke-width="4"/>
        <circle class="circle-bg" cx="50" cy="50" r="45" stroke="#ec4899" stroke-width="4" stroke-linecap="round" transform="rotate(-90 50 50)"/>
        <polyline class="checkmark" points="28,52 43,67 72,36" stroke="#f9a8d4" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>

    <div class="success-badge">✦ Verified Successfully</div>
    <h2>You're Logged In!</h2>
    <p class="subtitle">Identity verified. Welcome aboard, your session is now active.</p>

    <div class="info-card">
      <div class="info-row">
        <span class="info-icon">👤</span>
        <div>
          <div class="info-label">Name</div>
          <div class="info-value">{{ name }}</div>
        </div>
      </div>
      <div class="info-row">
        <span class="info-icon">📧</span>
        <div>
          <div class="info-label">Signed in as</div>
          <div class="info-value">{{ email }}</div>
        </div>
      </div>
    </div>

    <a href="/" class="btn-logout">Sign Out</a>
  </div>

  <script>
    // Confetti burst
    const colors = ['#ec4899','#a855f7','#f9a8d4','#fce7f3','#f472b6','#c084fc'];
    const container = document.getElementById('confetti');
    for (let i = 0; i < 30; i++) {
      const dot = document.createElement('div');
      dot.className = 'dot';
      dot.style.left = Math.random() * 100 + 'vw';
      dot.style.background = colors[Math.floor(Math.random() * colors.length)];
      dot.style.animationDuration = (3 + Math.random() * 4) + 's';
      dot.style.animationDelay = (Math.random() * 3) + 's';
      dot.style.width = dot.style.height = (6 + Math.random() * 8) + 'px';
      container.appendChild(dot);
    }
  </script>
</body>
</html>
