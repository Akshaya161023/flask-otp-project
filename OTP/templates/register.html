<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Create Account — SecureOTP</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      font-family: 'DM Sans', sans-serif;
      background: #031a0e;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden; position: relative;
    }
    body::before {
      content: '';
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 10% 20%, rgba(16,185,129,0.32) 0%, transparent 55%),
        radial-gradient(ellipse 60% 70% at 88% 80%, rgba(5,150,105,0.25) 0%, transparent 55%),
        radial-gradient(ellipse 50% 40% at 55% 5%,  rgba(110,231,183,0.12) 0%, transparent 60%);
      animation: meshShift 14s ease-in-out infinite alternate;
    }
    @keyframes meshShift {
      0%   { filter: hue-rotate(0deg); }
      100% { filter: hue-rotate(15deg); }
    }
    .orb { position: fixed; border-radius: 50%; filter: blur(90px); opacity: 0.30; animation: floatOrb 20s ease-in-out infinite; pointer-events: none; z-index: 0; }
    .orb-1 { width: 500px; height: 500px; background: #10b981; top: -160px; left: -120px; }
    .orb-2 { width: 350px; height: 350px; background: #059669; bottom: -100px; right: -80px; animation-delay: -7s; }
    .orb-3 { width: 220px; height: 220px; background: #34d399; top: 40%; left: 65%; animation-delay: -3s; }
    @keyframes floatOrb {
      0%, 100% { transform: translateY(0) scale(1); }
      50%       { transform: translateY(-50px) scale(1.07); }
    }
    .grid {
      position: fixed; inset: 0; z-index: 0;
      background-image:
        linear-gradient(rgba(16,185,129,0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(16,185,129,0.05) 1px, transparent 1px);
      background-size: 55px 55px;
    }
    .card {
      position: relative; z-index: 2;
      background: rgba(255,255,255,0.06);
      backdrop-filter: blur(30px) saturate(180%);
      -webkit-backdrop-filter: blur(30px) saturate(180%);
      border: 1px solid rgba(255,255,255,0.13);
      border-radius: 28px;
      box-shadow: 0 8px 64px rgba(0,0,0,0.55), inset 0 1px 0 rgba(255,255,255,0.13);
      padding: 52px 44px 44px;
      width: 100%; max-width: 420px;
      animation: cardIn 0.7s cubic-bezier(0.22,1,0.36,1) both;
    }
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(40px) scale(0.97); }
      to   { opacity: 1; transform: none; }
    }
    .brand { display: flex; align-items: center; gap: 11px; margin-bottom: 36px; }
    .brand-icon {
      width: 44px; height: 44px;
      background: linear-gradient(135deg, #10b981, #059669);
      border-radius: 13px;
      display: flex; align-items: center; justify-content: center;
      font-size: 21px;
      box-shadow: 0 4px 22px rgba(16,185,129,0.45);
    }
    .brand-name { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.25rem; color: #d1fae5; letter-spacing: -0.01em; }
    h2 { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 1.85rem; color: #d1fae5; letter-spacing: -0.03em; margin-bottom: 6px; }
    .subtitle { color: rgba(167,243,208,0.55); font-size: 0.9rem; font-weight: 300; margin-bottom: 34px; }
    .field { margin-bottom: 20px; }
    .field label { display: block; font-size: 0.76rem; font-weight: 500; color: rgba(167,243,208,0.60); letter-spacing: 0.07em; text-transform: uppercase; margin-bottom: 8px; }
    .field input {
      width: 100%;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 12px;
      padding: 14px 18px;
      color: #d1fae5;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
    }
    .field input::placeholder { color: rgba(167,243,208,0.28); }
    .field input:focus {
      border-color: rgba(16,185,129,0.65);
      background: rgba(255,255,255,0.11);
      box-shadow: 0 0 0 3px rgba(16,185,129,0.18);
    }
    .btn-primary {
      width: 100%; margin-top: 10px;
      padding: 15px;
      background: linear-gradient(135deg, #10b981 0%, #059669 100%);
      border: none; border-radius: 13px;
      color: #fff;
      font-family: 'Syne', sans-serif;
      font-weight: 700; font-size: 1rem;
      cursor: pointer;
      box-shadow: 0 4px 24px rgba(16,185,129,0.40);
      transition: transform 0.15s, box-shadow 0.15s, filter 0.15s;
      position: relative; overflow: hidden;
    }
    .btn-primary::after {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(120deg, rgba(255,255,255,0.15) 0%, transparent 60%);
      pointer-events: none;
    }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(16,185,129,0.50); filter: brightness(1.07); }
    .btn-primary:active { transform: translateY(0); }
    .divider { display: flex; align-items: center; gap: 12px; margin: 24px 0 20px; }
    .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: rgba(255,255,255,0.10); }
    .divider span { font-size: 0.78rem; color: rgba(167,243,208,0.38); white-space: nowrap; }
    .btn-secondary {
      width: 100%; padding: 14px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.13);
      border-radius: 13px;
      color: rgba(167,243,208,0.85);
      font-family: 'DM Sans', sans-serif;
      font-weight: 500; font-size: 0.95rem;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s, transform 0.15s;
      text-align: center; text-decoration: none; display: block;
    }
    .btn-secondary:hover { background: rgba(255,255,255,0.10); border-color: rgba(255,255,255,0.22); transform: translateY(-1px); }
    .error-msg {
      margin-top: 16px; padding: 12px 16px;
      background: rgba(239,68,68,0.15);
      border: 1px solid rgba(239,68,68,0.30);
      border-radius: 10px; color: #fca5a5;
      font-size: 0.87rem;
    }
    .step-badge {
      display: inline-flex; align-items: center; gap: 6px;
      background: rgba(16,185,129,0.15);
      border: 1px solid rgba(16,185,129,0.30);
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 0.75rem; font-weight: 500;
      color: #6ee7b7;
      margin-bottom: 16px;
    }
  </style>
</head>
<body>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
  <div class="grid"></div>

  <div class="card">
    <div class="brand">
      <div class="brand-icon">🛡️</div>
      <span class="brand-name">SecureOTP</span>
    </div>

    <div class="step-badge">✦ Step 1 of 2 — Registration</div>
    <h2>Create Account</h2>
    <p class="subtitle">Fill in your details. We'll send an OTP to verify your email address.</p>

    <form method="POST" action="/register">
      <div class="field">
        <label for="name">Full Name</label>
        <input type="text" id="name" name="name" placeholder="John Smith" required autofocus />
      </div>
      <div class="field">
        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" placeholder="you@example.com" required />
      </div>
      <button type="submit" class="btn-primary">Register &amp; Send OTP</button>
    </form>

    {% if error %}
    <div class="error-msg">⚠️ &nbsp;{{ error }}</div>
    {% endif %}

    <div class="divider"><span>Already have an account?</span></div>
    <a href="/" class="btn-secondary">Back to Sign In</a>
  </div>
</body>
</html>
